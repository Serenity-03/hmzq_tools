<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪门 - 概率计算器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>豪门 - 概率计算器</h1>
        <div id="loading" class="loading-overlay">计算中...</div>
        <div class="step-indicator" id="step-status">正在初始化...</div>
        <p>请输入已知格子的数字 (1-9)，未知格子留空或填0。</p>
        
        <div style="margin-bottom: 20px; text-align: center; display: flex; justify-content: center; align-items: center; gap: 10px;">
            <label class="switch">
                <input type="checkbox" id="auto-focus-toggle">
                <span class="slider round"></span>
            </label>
            <span style="color: #555; font-size: 0.95em;">开启“连续填写”模式（光标自动定位）</span>
        </div>
        
        <div class="game-area">
            <div class="grid-container">
                <!-- 3x3 Grid Inputs -->
                <div class="grid-row">
                    <div class="cell-wrapper">
                        <input type="number" id="cell-1-1" min="0" max="9" class="grid-cell">
                        <span id="ev-1-1" class="ev-display"></span>
                    </div>
                    <div class="cell-wrapper">
                        <input type="number" id="cell-1-2" min="0" max="9" class="grid-cell">
                        <span id="ev-1-2" class="ev-display"></span>
                    </div>
                    <div class="cell-wrapper">
                        <input type="number" id="cell-1-3" min="0" max="9" class="grid-cell">
                        <span id="ev-1-3" class="ev-display"></span>
                    </div>
                    <div class="row-result" id="res-row-1"></div>
                </div>
                <div class="grid-row">
                    <div class="cell-wrapper">
                        <input type="number" id="cell-2-1" min="0" max="9" class="grid-cell">
                        <span id="ev-2-1" class="ev-display"></span>
                    </div>
                    <div class="cell-wrapper">
                        <input type="number" id="cell-2-2" min="0" max="9" class="grid-cell">
                        <span id="ev-2-2" class="ev-display"></span>
                    </div>
                    <div class="cell-wrapper">
                        <input type="number" id="cell-2-3" min="0" max="9" class="grid-cell">
                        <span id="ev-2-3" class="ev-display"></span>
                    </div>
                    <div class="row-result" id="res-row-2"></div>
                </div>
                <div class="grid-row">
                    <div class="cell-wrapper">
                        <input type="number" id="cell-3-1" min="0" max="9" class="grid-cell">
                        <span id="ev-3-1" class="ev-display"></span>
                    </div>
                    <div class="cell-wrapper">
                        <input type="number" id="cell-3-2" min="0" max="9" class="grid-cell">
                        <span id="ev-3-2" class="ev-display"></span>
                    </div>
                    <div class="cell-wrapper">
                        <input type="number" id="cell-3-3" min="0" max="9" class="grid-cell">
                        <span id="ev-3-3" class="ev-display"></span>
                    </div>
                    <div class="row-result" id="res-row-3"></div>
                </div>
                
                <!-- Column Results -->
                <div class="col-results">
                    <div class="col-result" id="res-col-1"></div>
                    <div class="col-result" id="res-col-2"></div>
                    <div class="col-result" id="res-col-3"></div>
                </div>

                 <!-- Diagonal Results -->
                 <div class="diag-results">
                    <div class="diag-result left" id="res-diag-1">↖   : <span id="val-diag-1"></span></div>
                    <div class="diag-result right" id="res-diag-2">↗   : <span id="val-diag-2"></span></div>
                </div>
            </div>

            <div class="info-panel">
                <button onclick="resetGrid()" style="width: 100%; margin-bottom: 20px; background-color: #34495e;">重置 / 新一局</button>

                <h3>推荐选择</h3>
                <div id="recommendation" class="highlight"></div>
                <div id="probability-breakdown" class="prob-list"></div>

                <div id="alternate-recommendation-container" style="display: none; margin-top: 20px;">
                    <h3 style="color: #7f8c8d;">备选方案</h3>
                    <div id="alternate-recommendation" class="highlight-alt"></div>
                    <div id="alternate-probability-breakdown" class="prob-list"></div>
                </div>

                <h3>剩余数字</h3>
                <div id="remaining-numbers"></div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 30px; font-size: 0.8rem; color: #999; line-height: 1.6;">
            <span>本页访问量 <span id="busuanzi_page_pv">...</span> 次</span> | 
            <span>本页访客数 <span id="busuanzi_page_uv">...</span> 人</span>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="//cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>
</body>
</html>
